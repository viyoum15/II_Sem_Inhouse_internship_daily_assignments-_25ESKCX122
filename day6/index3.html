<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Cards</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

<div class="container py-5">
    <h2 class="text-center mb-4">Student Records</h2>

    <input type="text" id="search" class="form-control mb-4" placeholder="Search Student">

    <div id="container" class="row g-4"></div>

    <h4 class="mt-5">JSON Output</h4>
    <pre id="json"></pre>
</div>

<script>

const Students = [
    {name:"Rahul", branch:"CSE", cgpa:"8.4"},
    {name:"Ankit", branch:"CSE", cgpa:"7.9"},
    {name:"Priya", branch:"CSE", cgpa:"9.1"},
    {name:"Akshat", branch:"AI", cgpa:"8.2"},
    {name:"Bhavy", branch:"AI", cgpa:"7.8"},
    {name:"Bhavesh", branch:"AI", cgpa:"8.6"},
    {name:"Avi", branch:"AI", cgpa:"8.1"},
    {name:"Ishita", branch:"CSE", cgpa:"8.5"},
    {name:"Anup", branch:"AI", cgpa:"8.0"},
    {name:"Viyoum", branch:"DS", cgpa:"8.2"}
];

let html = "";

for(let i = 0; i < Students.length; i++){

    html += `
    <div class="col-md-4 card-item">

        <div class="card shadow-sm">

            <div class="card-body">

                <h4>${Students[i].name}</h4>

                <button class="btn btn-primary btn-sm mt-2">
                    Show Details
                </button>

                <div class="details mt-3" style="display:none;">
                    <p><strong>Branch:</strong> ${Students[i].branch}</p>
                    <p><strong>CGPA:</strong> ${Students[i].cgpa}</p>
                </div>

            </div>

        </div>

    </div>
    `;
}

document.getElementById("container").innerHTML = html;


// Show/Hide Details
$(document).on("click", ".btn", function () {

    $(this).next(".details").slideToggle();

});


// Search Student
$("#search").keyup(function () {

    let val = $(this).val().toLowerCase();

    $(".card-item").each(function () {

        let name = $(this).find("h4").text().toLowerCase();

        if(name.includes(val)){
            $(this).show();
        }
        else{
            $(this).hide();
        }

    });

});


// JSON Output
document.getElementById("json").innerHTML =
JSON.stringify(Students, ["name","cgpa"], 4);

</script>

</body>
</html>
