<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa; /* Soft neutral background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* Full viewport height */
      margin: 0;
    }
    .form-container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 900px; /* Wider form for side-by-side fields */
      box-sizing: border-box;
    }
    .form-container h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 25px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* Two columns */
      gap: 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 25px; /* Rounded edges */
      background: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      resize: none;
    }
    .full-width {
      grid-column: span 2; /* Field spans both columns */
    }
    button {
      grid-column: span 2;
      padding: 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
    button:hover {
      background: #2980b9;
    }
    /* Password wrapper styling */
    .password-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .password-wrapper input {
      flex: 1;
    }
    .toggle-btn {
      padding: 8px 15px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    .toggle-btn:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Registeration form</h2>
    <form action="submit.php" method="post">
      <div class="form-grid">
        <div>
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div>
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" required>
        </div>

        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div>
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" required>
        </div>

        <div>
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" required>
            <button type="button" class="toggle-btn" onclick="togglePassword('password')">Show</button>
          </div>
        </div>

        <div>
          <label for="confirm">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm" name="confirm" required>
            <button type="button" class="toggle-btn" onclick="togglePassword('confirm')">Show</button>
          </div>
        </div>

        <div>
          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div>
          <label for="department">Year/Department</label>
          <input type="text" id="department" name="department" required>
        </div>

        <div class="full-width">
          <label for="address">Address</label>
          <textarea id="address" name="address" rows="2" required></textarea>
        </div>

        <button type="submit">Register</button>
      </div>
    </form>
  </div>

  <script>
    function togglePassword(fieldId) {
      var input = document.getElementById(fieldId);
      var button = input.nextElementSibling;
      if (input.type === "password") {
        input.type = "text";
        button.textContent = "Hide";
      } else {
        input.type = "password";
        button.textContent = "Show";
      }
    }
  </script>
</body>
</html>
